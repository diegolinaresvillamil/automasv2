
<!-- HERO Tramites -->
<section class="hero-certimas">
  <div class="hero-wrap">
    <div class="hero-text">
      <h1>
        Bienvenido a
        <span class="highlight">{{ ciudadNombre$ | async }}</span>
      </h1>

      <!-- ✅ Como en tu TS actual NO existe "ciudad.descripcion",
           ponemos un texto base (o puedes quitar este <p>) -->
      <p>
        Conoce los servicios disponibles de AutoMás en
        <strong>{{ ciudadNombre$ | async }}</strong>.
      </p>
    </div>

    <div class="hero-image">
      <!-- ✅ Como en tu TS actual NO existe "ciudad.banner",
           dejamos un banner fijo (o puedes cambiarlo por uno default) -->
      <img
        src="/assets/banner-armenia.jpg"
        [alt]="'Ciudad ' + (ciudadNombre$ | async)"
      />
    </div>
  </div>
</section>

<app-hero-carousel
  [slides]="heroSlides"
  [autoplay]="true"
  [autoplayMs]="4500"
  [showArrows]="true"
  [showDots]="true"
></app-hero-carousel>

<app-services-grid
  title="Nuestros Servicios"
  [cards]="services"
></app-services-grid>

<app-cta-agendamiento-rtm
  imageSrc="assets/servicio.png"
  linkConsultar="#"
  linkAgendar="#"
></app-cta-agendamiento-rtm>

<!-- ✅ ACTUALIZADO: Agregado (openModal) -->
<app-preliquidacion-tramites
  [cards]="preliquidacionCards"
  [activeIndex]="0"
></app-preliquidacion-tramites>

<app-cta-agendamiento-peritaje></app-cta-agendamiento-peritaje>

<app-experiencia-grid [items]="experienciaItems"></app-experiencia-grid>

<app-cta-certimas
  logoSrc="assets/logo-certimas.png"
  title="¿Cómo Funciona?"
  description="Solo con tu placa podrás conocer el verdadero estado del vehículo que quieres comprar."
  videoUrl="https://www.youtube.com/watch?v=1SiC4T1kLVY&pp=ygUQY2VydGltYXMgYXV0b21hcw%3D%3D"
  ctaText="Compra Ahora"
  ctaHref="https://servicio.automas.co/compras/automas/?package=119100"
  imageSrc="assets/certimas.png"
></app-cta-certimas>

<app-servicios-complementarios-grid

  [cards]="complementariosCards"
></app-servicios-complementarios-grid>

<app-logos-carrousel

<app-noticias-grid
